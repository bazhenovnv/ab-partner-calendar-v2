version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ab_afisha
      POSTGRES_USER: ab_afisha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ab_afisha"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://ab_afisha:${POSTGRES_PASSWORD:-dev_password_change_me}@postgres:5432/ab_afisha
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: 8h
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      ADMIN_TELEGRAM_CHAT_ID: ${ADMIN_TELEGRAM_CHAT_ID:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/apps/backend/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_YANDEX_METRIKA_ID: ${YANDEX_METRIKA_ID:-110270689}
      NEXT_PUBLIC_CONTACT_EMAIL: info-event@a-b.ru
      BACKEND_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  bots:
    build:
      context: .
      dockerfile: apps/bots/Dockerfile
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      BACKEND_URL: http://backend:3001
      DATABASE_URL: postgresql://ab_afisha:${POSTGRES_PASSWORD:-dev_password_change_me}@postgres:5432/ab_afisha
      REDIS_URL: redis://redis:6379
      ADMIN_TELEGRAM_CHAT_ID: ${ADMIN_TELEGRAM_CHAT_ID:-}
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
  redis-data:
  uploads:
