version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ab_afisha
      POSTGRES_USER: ab_afisha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ab_afisha"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ab-afisha/backend:${APP_VERSION:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://ab_afisha:${POSTGRES_PASSWORD}@postgres:5432/ab_afisha
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      NEXT_PUBLIC_SITE_URL: https://ab-event.pro
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_IMPORT_ENABLED: ${MAX_IMPORT_ENABLED:-false}
      MAX_SOURCE_CHANNEL_ID: ${MAX_SOURCE_CHANNEL_ID}
      MAX_SOURCE_CHANNEL_URL: ${MAX_SOURCE_CHANNEL_URL}
      MAX_WEBHOOK_SECRET: ${MAX_WEBHOOK_SECRET}
      MAX_WEBHOOK_PUBLIC_URL: ${MAX_WEBHOOK_PUBLIC_URL}
      ADMIN_TELEGRAM_CHAT_ID: ${ADMIN_TELEGRAM_CHAT_ID}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN}
      THROTTLE_LIMIT: 200
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/apps/backend/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ab-afisha/frontend:${APP_VERSION:-latest}
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://ab-event.pro
      NEXT_PUBLIC_YANDEX_METRIKA_ID: ${YANDEX_METRIKA_ID:-110270689}
      NEXT_PUBLIC_CONTACT_EMAIL: info-event@a-b.ru
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}
      BACKEND_URL: http://backend:3001
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  bots:
    image: ab-afisha/bots:${APP_VERSION:-latest}
    restart: always
    environment:
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      BACKEND_URL: http://backend:3001
      DATABASE_URL: postgresql://ab_afisha:${POSTGRES_PASSWORD}@postgres:5432/ab_afisha
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ADMIN_TELEGRAM_CHAT_ID: ${ADMIN_TELEGRAM_CHAT_ID}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN}
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - uploads:/app/uploads:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
  redis-data:
  uploads:
