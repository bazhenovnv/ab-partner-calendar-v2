upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:3001;
}

# ── HTTP → HTTPS redirect — production ───────────────────────────────────────────
server {
    listen 80;
    server_name ab-event.pro www.ab-event.pro;
    return 301 https://$host$request_uri;
}

# ── HTTP — test.ab-event.pro (webroot ACME challenge + redirect) ────────────
# Port 80 must stay alive for certbot webroot renewal.
# /var/www/certbot is mounted via docker-compose.prod.yml nginx.volumes.
server {
    listen 80;
    server_name test.ab-event.pro;

    # ^~ gives highest priority so ACME challenge is never caught by / location
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Production HTTPS — ab-event.pro ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ab-event.pro www.ab-event.pro;

    ssl_certificate /etc/letsencrypt/live/ab-event.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ab-event.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' mc.yandex.ru yastatic.net; connect-src 'self' https://mc.yandex.ru https://ab-event.pro https://www.ab-event.pro https://test.ab-event.pro; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /_next/static/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# Staging HTTPS (test.ab-event.pro) is in staging-ssl.conf.
# Mount via docker-compose.staging.yml after certbot issues the cert.
# See: docs/PROJECT_BIBLE/STAGING_SSL_SETUP.md
