# Staging HTTPS — test.ab-event.pro
# Mounted via: docker compose -f docker-compose.prod.yml -f docker-compose.staging.yml up -d --no-deps nginx
# Run certbot first (HTTP-01 challenge via prod.conf port 80 block).
# See: docs/PROJECT_BIBLE/STAGING_SSL_SETUP.md
server {
    listen 443 ssl http2;
    server_name test.ab-event.pro;

    ssl_certificate /etc/letsencrypt/live/test.ab-event.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.ab-event.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Shorter HSTS for staging (no includeSubDomains)
    add_header Strict-Transport-Security "max-age=3600" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' mc.yandex.ru yastatic.net; connect-src 'self' https://mc.yandex.ru https://ab-event.pro https://www.ab-event.pro https://test.ab-event.pro; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
